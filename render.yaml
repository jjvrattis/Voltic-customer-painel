services:
  - type: web
    name: voltic-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ML_APP_ID
        sync: false
      - key: ML_CLIENT_SECRET
        sync: false
      - key: ML_REDIRECT_URI
        sync: false
      - key: SHOPEE_PARTNER_ID
        sync: false
      - key: SHOPEE_PARTNER_KEY
        sync: false
      - key: SHOPEE_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ABACATEPAY_API_KEY
        sync: false
      - key: ABACATEPAY_WEBHOOK_SECRET
        sync: false
      - key: PRICE_ML_CENTS
        value: "1150"
      - key: PRICE_SHOPEE_CENTS
        value: "800"
    healthCheckPath: /api/v1/health
